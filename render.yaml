services:
  postgres:
    name: research-rag-postgres
    plan: free
    type: pserv
    dbName: research_rag
    user: postgres
    ipAllowList: []

  qdrant:
    name: research-rag-qdrant
    plan: free
    type: web
    runtime: docker
    repo: https://github.com/qdrant/qdrant.git
    buildCommand: cd docker && docker build -t qdrant .
    startCommand: ./qdrant
    envVars:
      - key: QDRANT_API_KEY
        value: changeme_generate_strong_key
    healthCheckPath: /health
    healthCheckInterval: 10

  backend:
    name: research-rag-backend
    plan: free
    type: web
    runtime: python
    repo: https://github.com/your-org/research-rag.git
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: research-rag-postgres
          property: connectionString
      - key: QDRANT_HOST
        fromService:
          name: research-rag-qdrant
          property: host
      - key: QDRANT_PORT
        value: 6333
      - key: QDRANT_API_KEY
        value: changeme_generate_strong_key
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        value: YOUR_GEMINI_KEY_HERE
      - key: STORAGE_BACKEND
        value: s3
      - key: STORAGE_S3_BUCKET
        value: YOUR_R2_BUCKET_NAME
      - key: STORAGE_S3_REGION
        value: auto
      - key: STORAGE_S3_ACCESS_KEY
        value: YOUR_R2_ACCESS_KEY
      - key: STORAGE_S3_SECRET_KEY
        value: YOUR_R2_SECRET_KEY
      - key: STORAGE_S3_ENDPOINT
        value: https://YOUR_ACCOUNT.r2.cloudflarestorage.com
      - key: CORS_ORIGINS
        value: https://your-vercel-domain.vercel.app
    healthCheckPath: /api/health
    healthCheckInterval: 30
    autoDeploy: false

  frontend:
    name: research-rag-frontend
    plan: free
    type: web
    runtime: node
    repo: https://github.com/your-org/research-rag.git
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: research-rag-backend
          property: url
        appendPath: /api
    autoDeploy: false
